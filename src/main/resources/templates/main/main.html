<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=fcba3e006a75a5ca358a3e500b551116&libraries=services&autoload=false"></script>

    <script defer src="/main/assets/scripts/main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <script defer src="/main/assets/scripts/map.js"></script>

    <script src="/assets/scripts/fragment.js"></script>
    <script defer src="/assets/scripts/common.js"></script>
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/main/assets/styles/main.css">
    <title>Pet-Log</title>
</head>
<body>
<th:block th:replace="~{/fragments/common.html :: topNavigator}"></th:block>
<main id="main">
    <div class="content-wrapper">
        <div class="map" id="map">
            <!--지도 안 요소들 -->
            <div class="top-wrapper">
                <div class="search-box -flex-stretch" id="search">
                    <input class="search-input" type="text" id="placeInput" placeholder="장소 검색">
                    <button type="button" class="search-btn" aria-label="검색">
                        <img src="/main/assets/images/search.png" alt="" class="search-icon">
                    </button>
                </div>
                <!-- 카테고리 필터 버튼들 -->
                <div class="category-filter" id="categoryFilter">
                    <button class="front">&lt;</button>
                    <button class="category-btn" data-category="cafe">카페</button>
                    <button class="category-btn" data-category="hospital">병원</button>
                    <button class="category-btn" data-category="salon">미용실</button>
                    <button class="category-btn" data-category="school">유치원</button>
                    <button class="category-btn" data-category="park">공원</button>
                    <button class="category-btn" data-category="camp">캠핑장</button>
                    <button class="back">&gt;</button>

                </div>
            </div>
            <button class="button">현위치</button>
        </div>
        <div class="tab-list-container">
            <div class="tabs">
                <button id="friendTab" class="tab friend-tab active">친구</button>
                <button id="storeTab" class="tab store-tab">장소</button>
            </div>
            <div class="list" id="list">
                <!--메인 넣은 이유 : 프렌드리스트가 다른곳에도 있음-->
                <!-- 친구 리스트 + 안내 메시지를 하나의 wrapper로 묶음 -->
                <div class="friend-tab-content">
                    <!-- 친구 리스트 영역 -->
                    <ul id="friendList" class="main friend-list" th:if="${sessionUser != null}">
                        <li class="item" th:each="friend : ${nearbyFriends}">
                            <div class="item-wrapper"
                                 th:attr="data-user-id=${friend.userId},
                      data-birth=${friend.birthDate},
                     data-gender=${friend.gender.label},
                      data-introduction=${friend.introduction},
                    data-nickname=${friend.name}">

                            <div class="image">
                                    <img th:src="${friend.imageUrl != null ? friend.imageUrl : '/images/defaultPetImage.png'}"
                                         alt="user profile"/>
                                </div>
                                <div class="text-wrapper">
                                    <span class="nickname" th:text="${friend.name}">User Nickname</span>
                                    <span class="species"
                                          th:text="${friend.species != null ? friend.species : '반려동물 정보 없음'}">Species</span>
                                    <span class="distance" th:if="${friend.distance != null}">
                                    <span>📍</span>
                                    <span th:text="${#numbers.formatDecimal(friend.distance, 1, 1)} + 'km'">0.0km</span>
                                    </span>
                                </div>

                                <button th:class="${friend.isFollowing} ? 'button following' : 'button follow'"
                                        th:text="${friend.isFollowing} ? '팔로잉' : '팔로우'"
                                        th:attr="data-user-id=${friend.userId}">
                                </button>
                            </div>
                        </li>
                    </ul>

                    <!-- 로그인 안 됐을 때 안내 메시지 -->
                    <div th:if="${sessionUser == null}" class="no-login-msg">
                        친구 리스트는 로그인 후 이용 가능합니다.
                        <a href="/user/login">로그인</a>
                    </div>
                </div>

                <div class="store-panel hidden">
                    <!-- 리스트 헤더 -->
                    <div class="list-header hidden" id="listHeader">
                        <div class="result-count" id="resultCount"></div>
                        <div class="filter">
                            <button class="filter-btn" id="distanceFilterBtn">
                                거리순 ▾
                            </button>
                            <ul class="filter-menu hidden" id="distanceFilterMenu">
                                <li data-sort="near">가까운 순</li>
                                <li data-sort="far">먼 순</li>
                            </ul>
                        </div>
                    </div>

                    <!-- empty 상태 (기본 숨김) -->
                    <div class="empty" id="storeEmpty">
                        검색 결과가 없습니다
                    </div>

                    <!--  장소 리스트 뷰 (기본 노출) -->
                    <div class="place-list-view" id="placeListView">
                        <ul class="store-list" id="storeList">
                            <!-- JS로 장소 리스트 렌더링 -->
                        </ul>
                    </div>
                    <!-- 장소 상세 뷰 (기본 숨김) -->
                    <div class="place-detail-view hidden" id="placeDetailView">
                        <button class="back-btn" type="button" id="placeBackBtn">
                            &lt; 뒤로가기
                        </button>

                        <div class="place-detail-content" id="placeDetailContent">
                            <!-- JS로 선택된 장소 상세 렌더링 -->
                        </div>
                    </div>
                </div>

            </div>


            <!-- JS에서 nearbyFriendsPets 배열 생성 -->
            <script th:inline="javascript">
                /*<![CDATA[*/
                const nearbyFriendsPets = /*[[${nearbyFriendsPets}]]*/ [];
                /*]]>*/
            </script>
            <div id="descriptionContainer"></div>
        </div>
    </div>
</main>
<!-- 예약 모달 오버레이 -->
<div class="modal-overlay" id="reserveModal">
    <div class="modal">
        <!-- 헤더 -->
        <div class="modal-header">
            <h3>예약하기</h3>
            <button class="close-btn" type="button">&times;</button>
        </div>

        <!-- 바디 -->
        <div class="modal-body">
            <!-- 예약 날짜 -->
            <div class="form-group">
                <label>예약 날짜</label>
                <input type="date" id="reserveDate">
            </div>

            <!-- 예약 시간 -->
            <div class="form-group">
                <label>예약 시간</label>
                <select id="reserveTime"></select>
            </div>

            <!-- 요청 사항 -->
            <div class="form-group">
                <label>요청 사항</label>
                <input placeholder="요청 사항을 입력하세요" id="reserveRequest">
            </div>
            <div class="form-group">
                <label>결제 방법</label>
                <div class="payment-info">
                    <span class="payment-icon">💳</span>
                    <div>
                        <strong>만나서 결제</strong>
                        <p>예약 후 현장에서 결제해주세요</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- 푸터 -->
        <div class="modal-footer">
            <button class="btn cancel">취소</button>
            <button th:if="${sessionUser!= null}" class="btn confirm" data-store-id="">예약 확정</button>
            <th:block th:unless="${sessionUser != null}">
                <a th:href="@{/user/login}" class="btn login-confirm">로그인 후 예약해주세요</a>
            </th:block>
        </div>
    </div>
</div>
<div id="messageBox" class="message-box">
    <span class="title">알림</span>
    <span class="text"></span>
    <button class="button">확인</button>
</div>
<div th:replace="~{fragments/chat :: chatModal}"></div>
<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
