<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="shortcut icon" href="/assets/styles/images/favicon3.png">
    <script defer src="/assets/scripts/fragment.js"></script>
</head>
<body>
<div class="header-container" th:fragment="topNavigator">
    <div class="cover"></div>
    <div class="message" id="message">
        <div class="buttons">
            <button type="button" class="button confirm">확인</button>
            <button type="button" class="button cancel hidden">취소</button>
        </div>
    </div>
    <nav id="topNavigator"
         th:with=" isSigned=${session.sessionUser != null},
    isAdmin=${isSigned and session.sessionUser.userType == 'ADMIN'}">
        <!-- 커버 -->
        <div class="nav-wrapper">
            <div class="logo">
                <a th:if="${isAdmin}" th:href="@{/cs}">PetLog</a>
                <a th:if="${!isAdmin}" th:href="@{/main}">PetLog</a>
            </div>
            <div class="nav-category">
                <!-- ADMIN은 지도 숨김 -->
                <a th:if="${!isAdmin}" th:href="@{/main}" class="item">지도</a>

                <a th:if="${!isSigned or session.sessionUser.userType == 'PERSONAL'}"
                   th:href="@{/feed/explore}" class="item">피드</a>

                <a th:if="${!isSigned or session.sessionUser.userType == 'PERSONAL'}"
                   th:href="@{/shop/main}" class="item">쇼핑</a>
            </div>
            <div class="nav-user">

                <!-- ADMIN 전용 -->
                <a th:if="${isAdmin}" th:href="@{/cs}" class="item">문의 답변</a>
                <a th:if="${isAdmin}" th:href="@{/user/logout}" class="item">로그아웃</a>

                <!-- PERSONAL 전용 -->
                <a th:if="${isSigned and !isAdmin}" th:href="@{/shop/cart}" class="item">장바구니</a>
                <a th:if="${isSigned and !isAdmin}" th:href="@{/my}" class="item">마이페이지</a>
                <a th:if="${isSigned and !isAdmin}" th:href="@{/user/logout}" class="item">로그아웃</a>

                <!-- 비로그인 -->
                <a th:if="${!isSigned}" th:href="@{/user/login}" class="item">로그인</a>

                <!-- 공통 -->
                <a th:if="${!isAdmin}" th:href="@{/cs}" class="item">고객센터</a>
            </div>
        </div>
        <div class="hamburger">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"
                 fill="#ffffff" class="icon">
                <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
            </svg>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <button class="menu-close-btn" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"
                          width="24px" fill="#ffffff" class="icon">
                     <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
                </svg>
            </button>
            <span class="nav-caption"> CATEGORY </span>
            <div class="nav-category">
                <!-- ADMIN은 지도 숨김 -->
                <a th:if="${!isAdmin}" th:href="@{/main}" class="item">지도</a>

                <a th:if="${!isSigned or session.sessionUser.userType == 'PERSONAL'}"
                   th:href="@{/feed/explore}" class="item">피드</a>

                <a th:if="${!isSigned or session.sessionUser.userType == 'PERSONAL'}"
                   th:href="@{/shop/main}" class="item">쇼핑</a>
            </div>
            <span class="nav-caption user"> USER </span>
            <div class="nav-user">
                <a th:if="${isSigned and session.sessionUser.userType == 'PERSONAL'}" th:href="@{/shop/cart}" class="item">장바구니</a>
                <a th:if="${isSigned}" th:href="@{/my}" class="item">마이페이지</a>
                <a th:if="${isSigned}" th:href="@{/user/logout}" class="item">로그아웃</a>
                <a th:if="${!isSigned}" th:href="@{/user/login}" class="item">로그인</a>
                <a th:href="@{/cs}" class="item">고객센터</a>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
