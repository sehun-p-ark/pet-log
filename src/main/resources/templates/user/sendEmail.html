<!--이름에 0 붙은건 type 0 이라서 붙은거임-->
<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>이메일 본문 (0)</title>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Tint&family=Jersey+15&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

</head>
<body>

<div style="max-width: 600px; font-family: 'Pretendard Variable', Pretendard, sans-serif; margin: 0 auto;">
    <div style="background-color: #a6a09b; color: #ffffff; font-size: 12pt; font-weight: 300; letter-spacing: 2px; padding: 12px 18px;">PET LOG</div>
    <div style="color: #212121; line-height: 1.375; margin: 16px 0; text-align: justify;">
        <span th:text="${type}"></span> 요청에 따라 아래 인증번호를 전송하였습니다. 본인이 요청한게 아니라면 해당 이메일을 안전하게 삭제해 주시고, 절대로 아래 인증번호를 타인에게 알려주어서는 안 됩니다.</div>
    <code style="background-color: #f5f5f4; color: #424242; cursor: pointer; display: block; font-family: 'Roboto Mono', monospace; font-size: 14pt; letter-spacing: 12px; padding: 10px 20px; text-align: center; user-select: all;" th:text="${code}">000000</code>
    <div style="color: #212121; line-height: 1.375; margin: 16px 0; text-align: justify;">기타 문의 사항은 <a href="#">고객 센터</a>를 통해 남겨주시기 바랍니다. 감사합니다.</div>
    <div style="color: #757575; font-size: 9pt;">&copy; 2026 PET LOG.</div>
    <div style="color: #757575; font-size: 9pt;">https://www.PET-LOG.tld</div>
</div>

</body>
</html>
