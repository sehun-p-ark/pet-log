<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/shop/assets/styles/cart.css">
    <script defer src="/shop/assets/scripts/main.js"></script>
    <script defer src="/shop/assets/scripts/cart.js"></script>
    <script defer src="/assets/scripts/common.js"></script>
</head>
<body>
<th:block th:replace="~{/fragments/common.html :: topNavigator}"></th:block>
<div id="cart">
    <div class="list-wrapper">
        <div class="cart-header">
            <label class="select-label">
                <input class="select-all" id="select-all" type="checkbox">
                <span class="text">모두선택</span>
            </label>
            <div class="header-actions">
                <button class="action all-delete">전체삭제</button>
                <button class="action choice-delete">선택삭제</button>
            </div>
        </div>
        <div class="cart-list">
            <!-- 장바구니가 비어있을 때 -->
            <div class="empty-cart" th:classappend="${cartItems == null || cartItems.isEmpty()} ? 'show' : ''">
                <p>장바구니가 비어있습니다.</p>
            </div>

            <!-- 장바구니 아이템들 -->
            <div class="cart-item"
                 th:each="item : ${cartItems}"
                 th:data-cart-id="${item.get('cartId')}"
                 th:data-product-id="${item.get('productId')}"
                 th:data-option-id="${item.get('optionId') != null ? item.get('optionId') : ''}"
                 th:data-price="${item.get('price')}"
                 th:data-additional-price="${item.get('additionalPrice') != null ? item.get('additionalPrice') : 0}"
                 th:data-discount-rate="${item.get('discountRate')}"
                 th:data-delivery-fee="${item.get('deliveryFee')}">

                <label class="checkbox-label">
                    <input class="item-checkbox" type="checkbox">
                </label>

                <a th:href="@{/shop/product/{id}(id=${item.get('productId')})}">
                    <img class="image" th:src="${item.get('imageUrl') != null ? item.get('imageUrl') : '/shop/assets/images/product.png'}" alt="">
                </a>

                <div class="item-info">
                    <div class="product">
                        <a th:href="@{/shop/product/{id}(id=${item.get('productId')})}">
                            <span class="brand" th:text="'[' + ${item.get('brand')} + ']'"></span>
                            <span class="product-name" th:text="${item.get('productName')}"></span>
                        </a>
                    </div>

                    <div class="ship" th:text="${item.get('deliveryFee') == 0 ? '무료배송' : item.get('deliveryFee') + '원'}">무료배송</div>

                    <div class="option-wrapper" th:if="${item.get('optionName') != null}">
                        <span class="title">옵션:</span>
                        <span class="option" th:text="${item.get('optionName')}">노란색</span>
                    </div>

                    <div class="change-wrapper">
                        <label class="quantity-control">
                            <button class="quantity-btn minus" type="button">-</button>
                            <input class="quantity-input" type="text" th:value="${item.get('quantity')}">
                            <button class="quantity-btn plus" type="button">+</button>
                        </label>
                        <button class="option-change" type="button"
                                th:if="${item.get('optionName') != null}">옵션변경</button>
                        <div class="single-price" th:text="${#numbers.formatInteger((item.get('price') + (item.get('additionalPrice') != null ? item.get('additionalPrice') : 0)) * (100 - item.get('discountRate')) / 100, 0, 'COMMA') + '원'}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="summary-wrapper">
        <div class="summary">
            <div class="price all">
                <div class="title">총 상품금액</div>
                <div class="result">0원</div>
            </div>
            <div class="price ship-price">
                <div class="title">총 배송비</div>
                <div class="result">+0원</div>
            </div>
            <div class="price discount-price">
                <div class="title">총 할인금액</div>
                <div class="result">0원</div>
            </div>
            <div class="price payment-price">
                <div class="title">결제금액</div>
                <div class="result">0원</div>
            </div>
        </div>
        <button class="payment" type="button">상품을 선택해주세요.</button>
    </div>
</div>
<div th:replace="~{fragments/chat :: chatModal}"></div>
</body>
</html>
