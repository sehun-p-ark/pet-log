<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>상품 목록</title>
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/shop/assets/styles/list.css">
    <script defer src="/shop/assets/scripts/main.js"></script>
    <script defer src="/shop/assets/scripts/list.js"></script>
    <script defer src="/assets/scripts/shop-fragment.js"></script>
    <script defer src="/assets/scripts/common.js"></script>
</head>
<body>
<th:block th:replace="~{/fragments/common.html :: topNavigator}"></th:block>
<div id="list">
    <th:block th:replace="~{/fragments/shop.html :: category}"></th:block>

    <div class="product-section"
         th:data-pet-type="${petType}"
         th:data-category="${category}"
         th:data-category-id="${categoryId}"
         th:data-sub-category-id="${subCategoryId}"
         th:data-event-category-id="${eventCategoryId}"
         th:data-keyword="${keyword}"
         th:data-has-more="${products != null && products.size() == 20}">
        <div class="category-wrapper">
            <!-- 대분류 -->
            <div class="main-category" th:classappend="${eventCategoryId != null} ? 'event-mode'">
                <th:block th:if="${eventCategoryId == null}">
                    <button class="main-category-btn"
                            th:classappend="${categoryId == null} ? 'active'"
                            th:data-url="@{/shop/list(petType=${petType})}">전체</button>
                    <th:block th:if="${mainCategories != null}">
                        <th:block th:each="cat : ${mainCategories}">
                            <button class="main-category-btn"
                                    th:if="${cat.displayText != '이벤트'}"
                                    th:text="${cat.displayText}"
                                    th:classappend="${categoryId == cat.id} ? 'active'"
                                    th:data-url="@{/shop/list(petType=${petType},categoryId=${cat.id},category=${cat.displayText})}">
                            </button>
                        </th:block>
                    </th:block>
                </th:block>

                <!-- 이벤트 배너로 진입했을 때 -->
                <th:block th:if="${eventCategoryId != null}">
                    <span class="event-category-title">이벤트상품</span>
                </th:block>
                <div class="sort-filter">
                    <select id="sortSelect">
                        <option value="popular">판매순</option>
                        <option value="review">리뷰많은순</option>
                        <option value="price_low">낮은가격순</option>
                        <option value="price_high">높은가격순</option>
                        <option value="latest">최신순</option>
                    </select>
                </div>
            </div>

            <!-- 소분류 (슬라이드) -->
            <div class="sub-category" id="sub-category-container"
                 th:classappend="${subCategories != null} ? 'open'">
                <th:block th:if="${subCategories != null}">
                    <button class="sub-category-btn"
                            th:classappend="${subCategoryId == null} ? 'active'"
                            th:data-url="@{/shop/list(petType=${petType},category=${category},categoryId=${categoryId})}">전체</button>
                    <button class="sub-category-btn"
                            th:each="sub : ${subCategories}"
                            th:classappend="${subCategoryId == sub.id} ? 'active'"
                            th:text="${sub.displayText}"
                            th:data-url="@{/shop/list(petType=${petType},category=${category},categoryId=${categoryId},subCategoryId=${sub.id})}">
                    </button>
                </th:block>
            </div>
        </div>

        <div class="product">
            <div class="item"
                 th:each="product : ${products}"
                 th:data-product-id="${product.id}"
                 th:onclick="|location.href='/shop/product/${product.id}'|"
                 style="cursor: pointer;">

                <div class="image-wrapper">
                    <img class="image"
                         th:src="${product.productImages != null && !product.productImages.isEmpty()
                              ? product.productImages[0].imageUrl
                              : '/shop/assets/images/default-product.png'}"
                         th:alt="${product.name}">
                </div>
                <div class="brand" th:text="${product.brand}">브랜드</div>
                <div class="name" th:text="${product.name}">상품명</div>

                <!-- 할인이 있는 경우 -->
                <th:block th:if="${product.discountRate > 0}">
                    <div class="discount">
                        <span class="percent" th:text="${product.discountRate + '%'}">10%</span>
                        <span class="number" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA') + '원'}"></span>
                    </div>
                    <div class="price" th:text="${#numbers.formatInteger(product.discountPrice, 0, 'COMMA') + '원'}"></div>
                </th:block>

                <!-- 할인이 없는 경우 -->
                <div class="price"
                     th:if="${product.discountRate == 0 || product.discountRate == null}"
                     th:text="${#numbers.formatInteger(product.price, 0, 'COMMA') + '원'}">25,000원</div>
            </div>

            <!-- 상품이 없는 경우 -->
            <div th:if="${products == null || products.isEmpty()}"
                 style="grid-column: 1/-1; text-align: center; padding: 50px;">
                <p>등록된 상품이 없습니다.</p>
            </div>
        </div>
        <div id="scroll-sentinel"></div>
    </div>
</div>
<div th:replace="~{fragments/chat :: chatModal}"></div>
<div class="product-footer-wrapper">
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</div>
</body>
</html>
