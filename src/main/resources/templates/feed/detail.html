<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>상세 피드</title>
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/feed/style/common.css">
    <link rel="stylesheet" href="/feed/style/detail.css">
    <script defer src="/assets/scripts/common.js"></script>
    <script defer src="/feed/script/common.js"></script>
    <script defer src="/feed/script/detail.js"></script>
</head>
<body>

<div th:replace="~{fragments/common :: topNavigator}"></div>

<div class="cover"></div>
<div class="message" id="message">
    <button type="button" class="button">확인</button>
</div>

<div class="page">
    <button class="create-feed" id="createFeedBtn">
        <span class="plus">+</span>
        <span class="label">글쓰기</span>
    </button>

    <main class="grid-area">
        <section class="grid-header">
            <a class="back-link" href="/feed/explore">← 피드보기</a>
            <div class="grid-title">추천 피드</div>
        </section>

        <section id="feed-container">
            <!--피드들 자리 피드들 자리 피드들 자리 피드들 자리 피드들 자리 피드들 자리
            피드들 자리 피드들 자리 피드들 자리 피드들 자리 피드들 자리 피드들 자리
            피드들 자리 피드들 자리 피드들 자리 피드들 자리 피드들 자리 피드들 자리
            피드들 자리 피드들 자리 피드들 자리 피드들 자리 피드들 자리 피드들 자리 -->
        </section>
    </main>
    <!-- 우측: 상세 패널 -->
    <aside class="detail-area">
        <div class="detail-shell">
            <header class="detail-header">
                <a th:href="@{/feed/profile/{nickname}(nickname=${feed.nickname})}"
                   th:data-id="${feed.userId}"
                   class="detail-user">
                    <img class="avatar"
                         th:src="${feed.profileImageUrl != null ? feed.profileImageUrl : '/feed/images/explore/user.png'}"
                         alt="프로필">

                    <div class="user-meta">
                        <div th:text="${feed.nickname}"
                             th:data-nickname="${feed.nickname}"
                             class="nickname">sehun_pet</div>
                        <div class="place" th:text="${feed.address}">서울</div>
                    </div>
                </a>
                <div th:if="${feed.isWriter}" class="more-wrap">
                    <button type="button" class="more-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">
                            <path d="M308.27-451.64Q320-463.28 320-479.91t-11.64-28.36Q296.72-520 280.09-520t-28.36 11.64Q240-496.72 240-480.09t11.64 28.36Q263.28-440 279.91-440t28.36-11.64Zm200 0Q520-463.28 520-479.91t-11.64-28.36Q496.72-520 480.09-520t-28.36 11.64Q440-496.72 440-480.09t11.64 28.36Q463.28-440 479.91-440t28.36-11.64Zm200 0Q720-463.28 720-479.91t-11.64-28.36Q696.72-520 680.09-520t-28.36 11.64Q640-496.72 640-480.09t11.64 28.36Q663.28-440 679.91-440t28.36-11.64ZM480.13-120q-74.67 0-140.41-28.34-65.73-28.34-114.36-76.92-48.63-48.58-76.99-114.26Q120-405.19 120-479.87q0-74.67 28.34-140.41 28.34-65.73 76.92-114.36 48.58-48.63 114.26-76.99Q405.19-840 479.87-840q74.67 0 140.41 28.34 65.73 28.34 114.36 76.92 48.63 48.58 76.99 114.26Q840-554.81 840-480.13q0 74.67-28.34 140.41-28.34 65.73-76.92 114.36-48.58 48.63-114.26 76.99Q554.81-120 480.13-120Zm-.13-40q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                        </svg>
                    </button>
                    <div class="more-menu hidden">
                        <button type="button" class="more-edit">수정하기</button>
                        <button type="button" class="more-delete">삭제하기</button>
                    </div>
                </div>
            </header>

            <section class="detail-content">
                <div class="detail-image" th:if="${#lists.size(feed.feedMediaDtos) > 0}">
                    <button class="slide-btn prev hidden">‹</button>

                    <div class="slide-viewport">
                        <div class="slide-track">
                            <th:block th:each="media : ${feed.feedMediaDtos}">
                                <img th:if="${media.mediaType.name() == 'IMAGE'}"
                                     th:src="${media.mediaUrl}" alt="">
                                <video th:if="${media.mediaType.name() == 'VIDEO'}"
                                       th:src="${media.mediaUrl}" controls></video>
                            </th:block>


                            <div class="no-image-placeholder"
                                 th:if="${#lists.isEmpty(feed.feedMediaDtos)}">
                                이미지가 없습니다 🐶
                            </div>
                        </div>
                    </div>

                    <button class="slide-btn next">›</button>
                    <div class="slide-indicators"></div>
                </div>

                <div class="detail-info">
                    <h1 class="detail-title" th:text="${feed.title}">강아지랑 산책 🐾</h1>
                    <p class="detail-caption" th:text="${feed.content}">한강 산책 다녀왔어요. 날씨가 좋아서 기분 최고!</p>

                    <div class="feed-action">
                        <button class="action like" th:data-like="${feed.liked}">
                            <svg class="icon heart">
                                <use th:href="${feed.liked ? '#icon-heart-fill' : '#icon-heart'}"></use>
                            </svg>
                        </button>
                        <span class="count like" th:text="${feed.likeCount}"></span>

                        <button class="action comment">
                            <svg class="icon comment">
                                <use href="#icon-comment"></use>
                            </svg>
                        </button>
                        <span class="count comment" th:text="${feed.commentCount}"></span>
                    </div>

                    <hr class="divider"> <!--절취선-->

                    <section class="comments">
                        <h2 class="comments-title">댓글</h2>

                        <article class="comment"
                                 th:each="comment : ${feed.comments}"
                                 th:data-id="${comment.commentId}">
                            <img class="avatar sm"
                                 th:src="${comment.profileImageUrl != null
                                 ? comment.profileImageUrl : '/feed/images/explore/user.png'}"
                                 alt="댓글 프로필">
                            <div class="comment-body -flex-stretch">
                                <div class="comment-top">
                                    <span class="comment-user" th:text="${comment.nickname}">nana</span>
                                    <span class="comment-time"
                                          th:text="${comment.timeAgo}">
                                    </span>
                                    <button class="comment-delete-btn"
                                            th:if="${comment.userId == session.userId}">삭제</button>
                                </div>
                                <p class="comment-text" th:text="${comment.content}">너무 귀여워요 ㅠㅠ</p>
                                <button class="reply-btn"
                                        th:if="${#lists.size(comment.replies) > 0}">
                                    댓글 더보기
                                </button>
                                <!--대댓글-->
                                <div class="reply-list">
                                    <article class="comment reply"
                                             th:each="reply : ${comment.replies}"
                                             th:data-id="${reply.commentId}">
                                        <img class="avatar sm"
                                             th:src="${reply.profileImageUrl != null
                                             ? reply.profileImageUrl : '/feed/images/explore/user.png'}"
                                             alt="리플 프로필">

                                        <div class="comment-body">
                                            <div class="comment-top">
                                                <span class="comment-user" th:text="${reply.nickname}">닉네임</span>
                                                <span class="comment-time"
                                                      th:text="${reply.timeAgo}"></span>
                                                <button class="comment-delete-btn"
                                                        th:if="${comment.userId == session.userId}">삭제</button>
                                            </div>
                                            <p class="comment-text" th:text="${reply.content}">대댓글 내용</p>
                                        </div>
                                    </article>
                                </div>
                                <div class="reply-form hidden">
                                    <input type="text" class="reply-input" placeholder="답글을 입력하세요">
                                    <button class="reply-submit">등록</button>
                                </div>
                            </div>
                        </article>
                    </section>

                    <form class="comment-form">
                        <input class="comment-input" type="text" placeholder="댓글을 입력하세요">
                        <button class="btn" type="button">등록</button>
                    </form>
                </div>
            </section>
        </div>
    </aside>
</div>

<div th:replace="~{fragments/chat :: chatModal}"></div>

        <path d="M20 40 L160 180 L300 40" fill="none" stroke="currentColor" stroke-width="40" stroke-linecap="round"
              stroke-linejoin="round"/>
    </symbol>

</body>
</html>
