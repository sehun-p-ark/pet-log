<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>개인 프로필 피드</title>
    <link rel="stylesheet" href="/assets/styles/common.css">
    <link rel="stylesheet" href="/feed/style/common.css">
    <link rel="stylesheet" href="/feed/style/profile.css">
    <script defer src="/assets/scripts/common.js"></script>
    <script defer src="/feed/script/common.js"></script>
    <script defer src="/feed/script/profile.js"></script>
</head>
<body>

<div th:replace="~{fragments/common :: topNavigator}"></div>

<div class="cover"></div>
<div class="message" id="message">
    <button type="button" class="button">확인</button>
</div>

<main id="main">
    <button class="create-feed" id="createFeedBtn">
        <span class="plus">+</span>
        <span class="label">글쓰기</span>
    </button>

    <section class="profile-header">
        <div class="profile-avatar">
            <img th:src="${profile.profileImageUrl != null ? profile.profileImageUrl : '/feed/images/explore/user.png'}"
                 src="/feed/images/profile/user.png" alt="프로필">
        </div>
        <div class="profile-info">
            <h2 class="nickname" th:text="${profile.nickname}">sehun_pet</h2>
            <ul class="stats">
                <li class="item">게시물<strong th:text="${profile.feedCount}">58</strong></li>
                <li class="item">팔로워<strong th:text="${profile.followedCount}">10.3K</strong></li>
                <li class="item">팔로잉<strong th:text="${profile.followingCount}">350</strong></li>
            </ul>
        </div>
        <div class="profile-btns"
             th:classappend="${!profile.mine and !profile.following} ? ' single' : ''"
             th:data-mine="${profile.mine}"
             th:data-following="${profile.following}"
             th:data-target-user-id="${profile.userId}"
             th:data-nickname="${profile.nickname}">

            <!-- 1) 내 프로필 -->
            <th:block th:if="${profile.mine}">
                <button class="btn-share" type="button">프로필 공유</button>
                <button class="btn-edit" type="button">프로필 수정</button>
            </th:block>

            <!-- 2) 남의 프로필 -->
            <th:block th:if="${!profile.mine}">
                <!-- 팔로우 중 -->
                <th:block th:if="${profile.following}">
                    <button class="btn-follow-toggle is-following" type="button" data-action="unfollow">팔로우 해제</button>
                    <button class="btn-message" type="button">메세지</button>
                </th:block>

                <!-- 미팔로우 -->
                <th:block th:if="${!profile.following}">
                    <button class="btn-follow-toggle is-follow" type="button" data-action="follow">팔로우</button>
                </th:block>
            </th:block>
        </div>
    </section>

    <div class="profile-tab-nav">
        <button name="write" type="button" class="tab active">
            <img class="pen" src="/feed/images/profile/pen.png" alt="작성">
        </button>
        <th:block th:if="${profile.mine}">
            <button name="heart" type="button" class="tab">
                <img class="heart" src="/feed/images/profile/heart.png" alt="좋아요">
            </button>
            <button name="etc" type="button" class="tab">
                <img class="bone" src="/feed/images/profile/bone.png" alt="기타">
            </button>
        </th:block>
    </div>

    <section class="profile-feed">
        <article class="feed-card">
            <img src="/feed/images/explore/dog4.jpg" alt="">
        </article>

        <article class="feed-card">
            <img src="/feed/images/explore/dog2.jpg" alt="">
        </article>

        <article class="feed-card">
            <img src="/feed/images/explore/dog1.jpg" alt="">
        </article>

        <article class="feed-card">
            <img src="/feed/images/explore/dog5.jpg" alt="">
        </article>

        <article class="feed-card">
            <img src="/feed/images/explore/dog3.jpg" alt="">
        </article>

    </section>
</main>
<div th:replace="~{fragments/chat :: chatModal}"></div>
</body>
</html>
